services:
  db:
    container_name: task2schedule-db
    image: postgres:18.4-trixie
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 5
      timeout: 5s
      start_period: 15s
    networks:
      - backend
    volumes:
      - db-data:/var/lib/postgresql
    ports:
      - "5432:5432"
  
  migrate:
    container_name: task2schedule-migrate
    image: migrate/migrate:v4.19.1
    networks:
      - backend
    volumes:
      - ${PROJECT_ROOT}/db/migrations:/db/migrations
    depends_on:
      - db

  sqlc:
    container_name: task2schedule-sqlc
    image: sqlc/sqlc:1.31.1
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/sqlc.yml:/sqlc.yml
      - ${PROJECT_ROOT}/db/migrations:/db/migrations
      - ${PROJECT_ROOT}/db/queries:/db/queries
      - ${PROJECT_ROOT}/internal/repositories/sqlc:/internal/repositories/sqlc
    depends_on:
      - db

  swagger:
    container_name: task2schedule-swagger
    build:
      context: ${PROJECT_ROOT}
      dockerfile_inline: |
        FROM golang:1.25-alpine
        RUN apk add --no-cache git
        RUN go install github.com/swaggo/swag/cmd/swag@v1.16.6
        ENTRYPOINT ["swag"]
    working_dir: /code
    volumes:
      - ${PROJECT_ROOT}:/code


networks:
  backend:
volumes:
  db-data:
