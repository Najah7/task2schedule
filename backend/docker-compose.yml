services:
  db:
    container_name: task2schedule-db
    image: postgres:18.4-trixie
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 5
      timeout: 5s
      start_period: 15s
    networks:
      - backend
    volumes:
      - db-data:/var/lib/postgresql
    ports:
      - "5432:5432"
  
  


networks:
  backend:
volumes:
  db-data:
